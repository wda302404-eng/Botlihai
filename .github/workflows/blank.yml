name: Run Telegram Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      bot_token_input:
        description: 'Telegram Bot Token (可选，如果已设置 Secret 则留空)'
        required: false
      admin_id_input:
        description: 'Telegram Admin ID (可选，如果已设置 Secret 则留空)'
        required: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run Bot
        env:
          # 优先使用用户输入的 Token，如果没有则使用 Secrets
          BOT_TOKEN: ${{ github.event.inputs.bot_token_input || secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ github.event.inputs.admin_id_input || secrets.ADMIN_ID }}
        run: npm start
